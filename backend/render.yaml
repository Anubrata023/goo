services:
  - type: web
    name: jansaath-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: ./service-account-key.json
      - key: DEMO_MODE
        value: true